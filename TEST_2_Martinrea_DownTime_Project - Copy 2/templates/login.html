{% extends 'base.html' %}

{% block content %}
<div class="page-container">
    <header class="topbar">
        <div class="brand">
            <img src="{{ url_for('static', filename='images/martinrea_gray.png') }}" alt="Martinrea logo">
            <span>MARTINREA MODULES</span>
        </div>
        <div class="header-right">
            <div class="top-info">
                <span class="datetime" id="current-datetime"></span>
                <span class="location">Industrial Park Dinatech, 83297, Hermosillo, Sonora, Mexico.</span>
            </div>
            <div class="menu-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </header>

    <main class="login-card">
        <section class="login-form">
            <img class="avatar" src="{{ url_for('static', filename='images/unknown_user.png') }}" alt="Unknown user">
            <form action="{{ url_for('login') }}" method="post">
                <input type="text" name="username" placeholder="Username" autocomplete="username">
                <input type="password" name="password" placeholder="Password" autocomplete="current-password">
                <div class="button-row">
                    <a class="secondary" href="{{ url_for('register') }}">Register</a>
                    <button type="submit" class="primary">Log in</button>
                </div>
            </form>
            {% if error %}
                <div class="error-message">{{ error }}</div>
            {% endif %}
        </section>
    </main>

    <footer class="bottom-bar">
        <button class="footer-button secondary" type="button">Exit</button>
        <span>TEST 2 - BASE CODES, CONNECTION AND LATENCY</span>
        <button class="footer-button secondary" type="button">Help</button>
    </footer>
</div>
{% endblock %}
